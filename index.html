<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Webのタイトル名</title>
  </head>
  <body>
    <h1> midashi </h1>
    <a href="#MoveInPage">スクロール移動</a>
    <hr>
    <h2> komidashi </h2>
    aaaaaaa <br>
    bbbbbbb <br>
    ccccccc
    ddddddd
    <hr>
    <h2> komidashi </h2>
    <p> aaaaaaa </p>
    <p> bbbbbbb </p>
    <p> ccccccc </p>
    <p> ddddddd </p>
    <p> 
      <del>
        <mark> aaaa </mark>
        <sup> aaa </sup>
        <sub> aaa </sub>
      </del>
    </p>
    <img src="images/nanj.jpg" alt="なんJ民" width="10%">
    <a href="https://commons.nicovideo.jp/works/nc200158" target="aaa"> ニコニ・コモンズ </a>
    <h3 id="MoveInPage">スクロールリンク</h3>

    <div>
      <ul>
        <li> 富 </li>
        <li> 名声 </li>
        <li> 力 
          <ul> 
            <li> パワー </li>
          </ul>
        </li>
      </ul>
  
      <ol>
        <li> 友情 </li>
        <li> 努力 </li>
        <li> 勝利 </li>
      </ol>

    </div>

    <table border="1"> 
      <tr>
        <th> 0列 </th>
        <th> 1列 </th>
        <th> 2列 </th>
      </tr>
      <tr> 
        <td> 0-0 </td>
        <td> 0-1 </td>
        <td> 0-2 </td>
      </tr>
      <tr>
        <td> 1-0 </td>
        <td> 1-1 </td>
        <td> 1-2 </td>
      </tr>
      <tr>
        <td> 2-0 </td>
        <td> 2-1 </td>
        <td> 2-2 </td>
      </tr>
    </table>

    <p> おたんこ<span> ナス </span></p>

    <form action="リンク先URL" method="post">
      <input type="text" name="myname" size="1" placeholder="はいかいいえで答えてください">
      <br>
      <textarea name="review" cols="40" rows="10" placeholder="感想を入力"></textarea>
      <br>
      <input type="number" name="number" placeholder="好きな数字">
      <br>
      <input type="password" name="password" placeholder="パスワード">
      <br>
      <input type="checkbox" name="food" value="1" checked>1
      <input type="checkbox" name="food" value="2">2
      <input type="checkbox" name="food" value="3">3
      <br>
      <input type="radio" name="site" value="1" checked> はい
      <input type="radio" name="site" value="2"> うん
      <input type="radio" name="site" value="3"> 同意
      <br>
      <select name="birthday">
      <option value="" disabled>--</option>
      <option value="1">1月</option>
      <option value="2">2月</option>
      <option value="3" selected>3月</option>
      <option value="4">4月</option>
      <option value="5">5月</option>
      <option value="6">6月</option>
      <option value="7">7月</option>
      <option value="8">8月</option>
      <option value="9">9月</option>
      <option value="10">10月</option>
      <option value="11">11月</option>
      <option value="12">12月</option>
      </select>

      <br> 

      <input type="file" name="file">

      <br> 

      <input type="reset" value="フォーム全リセット">
    </form>

    <iframe src="embed.html"></iframe>

  </body>
</html>
